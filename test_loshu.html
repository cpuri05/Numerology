<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo Shu Grid Test</title>
</head>
<body>
    <h1>Lo Shu Grid Test Cases</h1>
    <pre id="output"></pre>

    <script src="numerology_core.js"></script>
    <script>
        const engine = new NumerologyEngine();
        const output = document.getElementById('output');
        let results = '';

        // Test Case 1: Male ("05-01-1990", "Male")
        results += '=== Test Case 1: Male ("05-01-1990", "Male") ===\n';
        const result1 = engine.calculate_lo_shu_grid('1990-01-05', 'Male');
        results += `Driver: ${result1.driver}\n`;
        results += `Conductor: ${result1.conductor}\n`;
        results += `Kua: ${result1.kua}\n`;
        results += 'Grid:\n';
        result1.grid.forEach((row, i) => {
            results += `  ${row.map(c => c === 0 ? 'null' : c).join(', ')}\n`;
        });
        results += `Frequencies: ${JSON.stringify(result1.frequencies)}\n\n`;

        // Expected: Driver=5, Conductor=7, Kua=1
        // Combined: [5,1,1,9,9,5,7,1] => 1:3, 5:2, 7:1, 9:2
        // Grid should show:
        // [null, 9,9, null]
        // [null, 5,5, 7]
        // [null, 1,1,1, null]

        // Test Case 2: Female ("05-01-1990", "Female")
        results += '=== Test Case 2: Female ("05-01-1990", "Female") ===\n';
        const result2 = engine.calculate_lo_shu_grid('1990-01-05', 'Female');
        results += `Driver: ${result2.driver}\n`;
        results += `Conductor: ${result2.conductor}\n`;
        results += `Kua: ${result2.kua}\n`;
        results += 'Grid:\n';
        result2.grid.forEach((row, i) => {
            results += `  ${row.map(c => c === 0 ? 'null' : c).join(', ')}\n`;
        });
        results += `Frequencies: ${JSON.stringify(result2.frequencies)}\n\n`;

        // Expected: Driver=5, Conductor=7, Kua=5
        // Combined: [5,1,1,9,9,5,7,5] => 1:2, 5:3, 7:1, 9:2
        // Grid should show:
        // [null, 9,9, null]
        // [null, 5,5,5, 7]
        // [null, 1,1, null]

        output.textContent = results;
    </script>
</body>
</html>
