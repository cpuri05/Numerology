<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Alphanumeric Conversion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
        }
        .result {
            font-size: 24px;
            color: #2c5f2d;
            font-weight: bold;
            margin: 10px 0;
        }
        .example {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Test Alphanumeric Number Conversion</h1>
    
    <div class="test-box">
        <h3>Enter Vehicle Number or Phone Number:</h3>
        <input type="text" id="testInput" placeholder="e.g., UP16BH7890 or 9876543210">
        <button onclick="testCalculation()" style="padding: 10px 20px; font-size: 16px;">Calculate</button>
        <div class="result" id="result"></div>
    </div>

    <div class="test-box">
        <h3>Examples:</h3>
        <div class="example">
            <strong>Vehicle Number:</strong> UP16BH7890<br>
            <small>U=6, P=8, B=2, K=2, H=5, + digits 1,6,7,8,9,0</small>
        </div>
        <div class="example">
            <strong>Phone Number:</strong> 9876543210<br>
            <small>All digits: 9+8+7+6+5+4+3+2+1+0</small>
        </div>
        <div class="example">
            <strong>Mixed:</strong> ABC123<br>
            <small>A=1, B=2, C=3, + digits 1,2,3</small>
        </div>
    </div>

    <script src="numerology_core.js"></script>
    <script>
        const engine = new NumerologyEngine();
        
        function testCalculation() {
            const input = document.getElementById('testInput').value;
            const vibration = engine.calculate_vibration(input);
            document.getElementById('result').textContent = `Vibration Number: ${vibration}`;
        }
    </script>
</body>
</html>
